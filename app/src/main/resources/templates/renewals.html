<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('契約更新通知')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <h2>&#x1F514; 契約更新通知</h2>
    <hr/>

    <!-- 検索フォーム -->
    <div class="panel panel-default">
        <div class="panel-heading"><h3 class="panel-title">絞り込み条件</h3></div>
        <div class="panel-body">
            <form th:action="@{/renewals}" method="get" class="form-inline">
                <div class="form-group" style="margin-right:15px;">
                    <label for="daysBeforeExpiry">対象日数:</label>
                    <input type="number" id="daysBeforeExpiry" name="daysBeforeExpiry"
                           class="form-control" min="1" max="365" style="width:100px;"
                           th:value="${daysBeforeExpiry != null ? daysBeforeExpiry : 30}"/>
                    <span class="help-block" style="display:inline;margin-left:5px;">日以内</span>
                </div>
                <div class="form-group" style="margin-right:15px;">
                    <label for="agentName">担当者名:</label>
                    <input type="text" id="agentName" name="agentName"
                           class="form-control" placeholder="（空白 = 全担当者）" style="width:200px;"
                           th:value="${agentName}"/>
                </div>
                <button type="submit" class="btn btn-primary">検索</button>
                <a th:href="@{/renewals}" class="btn btn-default">リセット</a>
            </form>
        </div>
    </div>

    <!-- エラーメッセージ -->
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- 結果サマリー -->
    <div th:if="${renewalData != null}">
        <div class="alert alert-info">
            更新日まで <strong th:text="${renewalData['daysBeforeExpiry']}"></strong> 日以内の有効契約:
            <strong th:text="${renewalData['totalCount']}"></strong> 件
            <span th:if="${agentName != null and !#strings.isEmpty(agentName)}">
                （担当者: <strong th:text="${agentName}"></strong>）
            </span>
        </div>

        <!-- 更新通知テーブル -->
        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title">更新間近の契約一覧</h3>
            </div>
            <table class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>残日数</th>
                        <th>氏名</th>
                        <th>契約番号</th>
                        <th>契約種別</th>
                        <th>保険料（円）</th>
                        <th>更新日</th>
                        <th>担当者</th>
                        <th>連絡先</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${renewalData['renewals']}">
                        <td class="text-center">
                            <span th:if="${r['daysUntilExpiry'] <= 7}" class="label label-danger"
                                  th:text="${r['daysUntilExpiry']} + '日'"></span>
                            <span th:if="${r['daysUntilExpiry'] > 7 and r['daysUntilExpiry'] <= 14}" class="label label-warning"
                                  th:text="${r['daysUntilExpiry']} + '日'"></span>
                            <span th:if="${r['daysUntilExpiry'] > 14}" class="label label-success"
                                  th:text="${r['daysUntilExpiry']} + '日'"></span>
                        </td>
                        <td>
                            <a th:href="@{/customers/{id}(id=${r['customerId']})}"
                               th:text="${r['lastName']} + ' ' + ${r['firstName']}"></a>
                        </td>
                        <td th:text="${r['policyNumber']}"></td>
                        <td>
                            <span th:switch="${r['policyType']}">
                                <span th:case="'LIFE'">生命保険</span>
                                <span th:case="'MEDICAL'">医療保険</span>
                                <span th:case="'AUTO'">自動車保険</span>
                                <span th:case="'FIRE'">火災保険</span>
                                <span th:case="*" th:text="${r['policyType']}"></span>
                            </span>
                        </td>
                        <td th:text="${#numbers.formatDecimal(r['premiumAmount'], 0, 'COMMA', 0, 'POINT')} + '円'"></td>
                        <td th:text="${r['policyEndDate'] != null ? #dates.format(r['policyEndDate'], 'yyyy-MM-dd') : '-'}"></td>
                        <td th:text="${r['agentName']}"></td>
                        <td>
                            <span th:if="${r['email'] != null}">
                                <a th:href="'mailto:' + ${r['email']}" th:text="${r['email']}"></a>
                            </span>
                            <span th:if="${r['email'] == null}" class="text-muted">—</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(renewalData['renewals'])}">
                        <td colspan="8" class="text-center text-muted">該当する契約はありません</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 凡例 -->
        <div class="panel panel-default">
            <div class="panel-body">
                <strong>残日数の色分け:</strong>&nbsp;
                <span class="label label-danger">7日以内</span>&nbsp;
                <span class="label label-warning">8〜14日</span>&nbsp;
                <span class="label label-success">15日以上</span>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>
</html>
