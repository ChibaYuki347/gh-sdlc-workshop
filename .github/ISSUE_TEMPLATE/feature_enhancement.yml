name: 機能改善
description: 機能改善・新機能の提案
title: "[機能改善] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能改善・新機能のリクエストをお寄せいただきありがとうございます。
        以下の項目をできるだけ詳しくご記入ください。
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 改善したい機能や追加したい機能の概要を記載してください。
      placeholder: 例）顧客検索機能にフリガナ検索を追加したい
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 背景・動機
      description: なぜこの機能が必要なのか、どのような課題を解決するのかを記載してください。
      placeholder: 例）現状は名前の完全一致でしか検索できず、漢字の読みが分からない場合に顧客を見つけられない
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: 提案する解決策
      description: 具体的な解決策やアイデアがあれば記載してください。
      placeholder: 例）Customer モデルにフリガナフィールドを追加し、部分一致検索に対応する
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 検討した代替案があれば記載してください。
      placeholder: 例）外部の検索エンジンを導入する方法も検討したが、コストが高い
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: 補足情報
      description: スクリーンショット、参考資料、関連する Issue など、補足情報があれば記載してください。
    validations:
      required: false
