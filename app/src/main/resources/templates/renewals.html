<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('契約更新通知')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <h2>&#x1F514; 契約更新通知</h2>
    <hr/>

    <!-- フィルタ -->
    <div class="panel panel-default">
        <div class="panel-body">
            <form th:action="@{/renewals}" method="get" class="form-inline">
                <div class="form-group" style="margin-right:15px;">
                    <label for="daysUntilRenewal">更新日まで:</label>
                    <select id="daysUntilRenewal" name="daysUntilRenewal" class="form-control">
                        <option value="7" th:selected="${daysUntilRenewal == 7}">7日以内</option>
                        <option value="14" th:selected="${daysUntilRenewal == 14}">14日以内</option>
                        <option value="30" th:selected="${daysUntilRenewal == 30}">30日以内</option>
                        <option value="60" th:selected="${daysUntilRenewal == 60}">60日以内</option>
                        <option value="90" th:selected="${daysUntilRenewal == 90}">90日以内</option>
                        <option value="365" th:selected="${daysUntilRenewal == 365}">1年以内</option>
                    </select>
                </div>
                <div class="form-group" style="margin-right:15px;">
                    <label for="agentName">営業担当者:</label>
                    <input type="text" id="agentName" name="agentName" class="form-control"
                           placeholder="担当者名" th:value="${agentName}" style="width:200px;"/>
                </div>
                <button type="submit" class="btn btn-primary">検索</button>
                <a th:href="@{/renewals}" class="btn btn-default">クリア</a>
            </form>
        </div>
    </div>

    <!-- 検索結果サマリー -->
    <div class="alert alert-info">
        <strong>検索条件:</strong>
        更新日まで <strong th:text="${daysUntilRenewal}">30</strong> 日以内
        <span th:if="${agentName != null}">
            / 担当者: <strong th:text="${agentName}"></strong>
        </span>
        &nbsp;—&nbsp;
        <strong th:text="${response.totalCount}">0</strong> 件の更新対象があります
    </div>

    <!-- 更新対象テーブル -->
    <div class="panel panel-default">
        <div class="panel-heading">
            <h3 class="panel-title">更新対象顧客リスト</h3>
        </div>
        <table class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>残日数</th>
                    <th>氏名</th>
                    <th>メール</th>
                    <th>電話番号</th>
                    <th>契約番号</th>
                    <th>契約種別</th>
                    <th>保険料</th>
                    <th>更新日</th>
                    <th>営業担当</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${response.renewals}">
                    <td>
                        <span th:if="${r.daysUntilRenewal < 0}" class="label label-danger"
                              th:text="${r.daysUntilRenewal} + '日'">超過</span>
                        <span th:if="${r.daysUntilRenewal == 0}" class="label label-danger">本日</span>
                        <span th:if="${r.daysUntilRenewal > 0 and r.daysUntilRenewal <= 7}" class="label label-warning"
                              th:text="${r.daysUntilRenewal} + '日'"></span>
                        <span th:if="${r.daysUntilRenewal > 7}" class="label label-info"
                              th:text="${r.daysUntilRenewal} + '日'"></span>
                    </td>
                    <td>
                        <a th:href="@{/customers/{id}(id=${r.customerId})}" th:text="${r.fullName}"></a>
                    </td>
                    <td th:text="${r.email != null ? r.email : '—'}"></td>
                    <td th:text="${r.phone != null ? r.phone : '—'}"></td>
                    <td th:text="${r.policyNumber}"></td>
                    <td th:text="${r.policyType}"></td>
                    <td th:text="${#numbers.formatDecimal(r.premiumAmount, 0, 'COMMA', 0, 'POINT')} + ' 円'"></td>
                    <td th:text="${r.policyEndDate}"></td>
                    <td th:text="${r.agentName}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(response.renewals)}">
                    <td colspan="9" class="text-center">更新対象の顧客はいません</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>
</html>
