<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('ダッシュボード')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <h2>ダッシュボード</h2>
    <hr/>

    <!-- サマリー統計 -->
    <div class="row">
        <div class="col-md-3">
            <div class="panel panel-primary">
                <div class="panel-body stat-box">
                    <div class="stat-number" th:text="${report['totalCustomers']}">0</div>
                    <div class="stat-label">総顧客数</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="panel panel-success">
                <div class="panel-body stat-box">
                    <div class="stat-number" th:text="${report['activeContracts']}">0</div>
                    <div class="stat-label">有効契約数</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="panel panel-danger">
                <div class="panel-body stat-box">
                    <div class="stat-number" th:text="${report['expiredContracts']}">0</div>
                    <div class="stat-label">失効契約数</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="panel panel-info">
                <div class="panel-body stat-box">
                    <div class="stat-number" th:text="${#numbers.formatDecimal(report['totalMonthlyPremium'], 0, 'COMMA', 0, 'POINT')}">0</div>
                    <div class="stat-label">月間保険料合計（円）</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 更新通知サマリー -->
    <div class="row">
        <div class="col-md-12">
            <div class="panel panel-warning">
                <div class="panel-body stat-box">
                    <a th:href="@{/renewals}" style="text-decoration:none; color:inherit;">
                        <div class="stat-number" th:text="${upcomingRenewalsCount}">0</div>
                        <div class="stat-label">更新間近の契約（30日以内）— クリックして詳細を確認</div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- クイックリンク -->
    <div class="row">
        <div class="col-md-6">
            <div class="panel panel-default">
                <div class="panel-heading"><h3 class="panel-title">クイック操作</h3></div>
                <div class="panel-body">
                    <a th:href="@{/customers/new}" class="btn btn-primary btn-lg btn-block" style="margin-bottom:10px;">
                        新規顧客登録
                    </a>
                    <a th:href="@{/premium-calculator}" class="btn btn-info btn-lg btn-block" style="margin-bottom:10px;">
                        保険料シミュレーション
                    </a>
                    <a th:href="@{/report}" class="btn btn-warning btn-lg btn-block">
                        月次レポート表示
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="panel panel-default">
                <div class="panel-heading"><h3 class="panel-title">最近の顧客</h3></div>
                <table class="table table-striped table-bordered" style="margin-bottom:0;">
                    <thead>
                        <tr>
                            <th>氏名</th>
                            <th>契約種別</th>
                            <th>ステータス</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${recentCustomers}">
                            <td><a th:href="@{/customers/{id}(id=${c.id})}" th:text="${c.getFullName()}"></a></td>
                            <td th:text="${c.policyType}"></td>
                            <td>
                                <span th:if="${c.policyStatus == 0}" class="label label-warning">申請中</span>
                                <span th:if="${c.policyStatus == 1}" class="label label-success">有効</span>
                                <span th:if="${c.policyStatus == 2}" class="label label-danger">失効</span>
                                <span th:if="${c.policyStatus == 3}" class="label label-default">解約</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(recentCustomers)}">
                            <td colspan="3" class="text-center">顧客データがありません</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>
</html>
