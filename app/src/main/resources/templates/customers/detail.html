<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('顧客詳細')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <h2>顧客詳細</h2>
    <hr/>

    <!-- フラッシュメッセージ -->
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <div class="row">
        <!-- 基本情報 -->
        <div class="col-md-6">
            <div class="panel panel-default">
                <div class="panel-heading"><h3 class="panel-title">基本情報</h3></div>
                <table class="table table-bordered">
                    <tr><th style="width:30%;">ID</th><td th:text="${customer.id}"></td></tr>
                    <tr><th>氏名</th><td th:text="${customer.getFullName()}"></td></tr>
                    <tr><th>メール</th><td th:text="${customer.email}"></td></tr>
                    <tr><th>電話番号</th><td th:text="${customer.phone}"></td></tr>
                    <tr><th>住所</th><td th:text="${customer.address}"></td></tr>
                    <tr><th>登録日</th><td th:text="${customer.createdAt}"></td></tr>
                    <tr><th>更新日</th><td th:text="${customer.updatedAt}"></td></tr>
                </table>
            </div>
        </div>

        <!-- 契約情報 -->
        <div class="col-md-6">
            <div class="panel panel-default">
                <div class="panel-heading"><h3 class="panel-title">契約情報</h3></div>
                <table class="table table-bordered">
                    <tr><th style="width:30%;">契約番号</th><td th:text="${customer.policyNumber}"></td></tr>
                    <tr>
                        <th>契約種別</th>
                        <td>
                            <span th:if="${customer.policyType == 'LIFE'}">生命保険</span>
                            <span th:if="${customer.policyType == 'MEDICAL'}">医療保険</span>
                            <span th:if="${customer.policyType == 'AUTO'}">自動車保険</span>
                            <span th:if="${customer.policyType == 'FIRE'}">火災保険</span>
                        </td>
                    </tr>
                    <tr>
                        <th>ステータス</th>
                        <td>
                            <span th:if="${customer.policyStatus == 0}" class="label label-warning">申請中</span>
                            <span th:if="${customer.policyStatus == 1}" class="label label-success">有効</span>
                            <span th:if="${customer.policyStatus == 2}" class="label label-danger">失効</span>
                            <span th:if="${customer.policyStatus == 3}" class="label label-default">解約</span>
                        </td>
                    </tr>
                    <tr><th>保険料</th><td th:text="${#numbers.formatDecimal(customer.premiumAmount, 0, 'COMMA', 0, 'POINT')} + '円/月'"></td></tr>
                    <tr><th>契約開始日</th><td th:text="${customer.policyStartDate}"></td></tr>
                    <tr><th>契約終了日</th><td th:text="${customer.policyEndDate}"></td></tr>
                </table>
            </div>
        </div>
    </div>

    <!-- 担当者情報 -->
    <div class="row">
        <div class="col-md-6">
            <div class="panel panel-default">
                <div class="panel-heading"><h3 class="panel-title">担当者情報</h3></div>
                <table class="table table-bordered">
                    <tr><th style="width:30%;">担当者名</th><td th:text="${customer.agentName}"></td></tr>
                    <tr><th>担当者メール</th><td th:text="${customer.agentEmail}"></td></tr>
                </table>
            </div>
        </div>
    </div>

    <!-- 操作ボタン -->
    <div class="well">
        <a th:href="@{/customers/{id}/edit(id=${customer.id})}" class="btn btn-warning">編集</a>
        <a th:href="@{/customers/{id}/delete(id=${customer.id})}" class="btn btn-danger">削除</a>
        <a th:href="@{/customers}" class="btn btn-default">一覧に戻る</a>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>
</html>
