<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('更新通知')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <h2>更新通知</h2>
    <p class="text-muted">契約終了日が30日以内に迫っている有効契約の一覧です。</p>
    <hr/>

    <div class="panel panel-warning">
        <div class="panel-heading"><h3 class="panel-title">更新間近の契約一覧</h3></div>
        <table class="table table-striped table-bordered" style="margin-bottom:0;">
            <thead>
                <tr>
                    <th>顧客名</th>
                    <th>証券番号</th>
                    <th>契約種別</th>
                    <th>契約終了日</th>
                    <th>月額保険料（円）</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${renewals}">
                    <td><a th:href="@{/customers/{id}(id=${c.id})}" th:text="${c.getFullName()}"></a></td>
                    <td th:text="${c.policyNumber}"></td>
                    <td th:text="${c.policyType}"></td>
                    <td th:text="${#dates.format(c.policyEndDate, 'yyyy/MM/dd')}"></td>
                    <td th:text="${#numbers.formatDecimal(c.premiumAmount, 0, 'COMMA', 0, 'POINT')}"></td>
                    <td>
                        <a th:href="@{/customers/{id}(id=${c.id})}" class="btn btn-sm btn-primary">詳細</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(renewals)}">
                    <td colspan="6" class="text-center">更新間近の契約はありません</td>
                </tr>
            </tbody>
        </table>
    </div>

    <a th:href="@{/}" class="btn btn-default">ダッシュボードへ戻る</a>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>
</html>
