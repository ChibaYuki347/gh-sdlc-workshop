<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('削除確認')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <h2>顧客削除確認</h2>
    <hr/>

    <div class="panel panel-danger">
        <div class="panel-heading"><h3 class="panel-title">以下の顧客を削除しますか？</h3></div>
        <div class="panel-body">
            <table class="table table-bordered">
                <tr><th style="width:20%;">ID</th><td th:text="${customer.id}"></td></tr>
                <tr><th>氏名</th><td th:text="${customer.getFullName()}"></td></tr>
                <tr><th>メール</th><td th:text="${customer.email}"></td></tr>
                <tr><th>契約番号</th><td th:text="${customer.policyNumber}"></td></tr>
                <tr><th>契約種別</th><td th:text="${customer.policyType}"></td></tr>
            </table>

            <div class="alert alert-danger">
                <strong>警告:</strong> この操作は取り消せません。本当に削除しますか？
            </div>

            <a th:href="@{/customers/{id}/delete(id=${customer.id}, confirm='yes')}" class="btn btn-danger">削除する</a>
            <a th:href="@{/customers/{id}(id=${customer.id})}" class="btn btn-default">キャンセル</a>
        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>
</html>
