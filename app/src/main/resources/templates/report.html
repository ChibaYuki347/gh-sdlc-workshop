<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('月次レポート')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <h2>月次レポート</h2>
    <p class="text-muted">生成日時: <span th:text="${report['generatedAt']}"></span></p>
    <hr/>

    <!-- サマリー -->
    <div class="row">
        <div class="col-md-2 col-md-offset-1">
            <div class="panel panel-primary">
                <div class="panel-body stat-box">
                    <div class="stat-number" th:text="${report['totalCustomers']}">0</div>
                    <div class="stat-label">総顧客数</div>
                </div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="panel panel-success">
                <div class="panel-body stat-box">
                    <div class="stat-number" th:text="${report['activeContracts']}">0</div>
                    <div class="stat-label">有効契約</div>
                </div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="panel panel-danger">
                <div class="panel-body stat-box">
                    <div class="stat-number" th:text="${report['expiredContracts']}">0</div>
                    <div class="stat-label">失効契約</div>
                </div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="panel panel-info">
                <div class="panel-body stat-box">
                    <div class="stat-number" th:text="${#numbers.formatDecimal(report['totalMonthlyPremium'], 0, 'COMMA', 0, 'POINT')}">0</div>
                    <div class="stat-label">月間保険料（円）</div>
                </div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="panel panel-warning">
                <div class="panel-body stat-box">
                    <div class="stat-number" th:text="${#numbers.formatDecimal(report['averagePremium'], 0, 'COMMA', 0, 'POINT')}">0</div>
                    <div class="stat-label">平均保険料（円）</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 顧客一覧テーブル -->
    <div class="panel panel-default">
        <div class="panel-heading"><h3 class="panel-title">全顧客データ</h3></div>
        <table class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>氏名</th>
                    <th>契約番号</th>
                    <th>契約種別</th>
                    <th>ステータス</th>
                    <th>保険料（円）</th>
                    <th>担当者</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${customers}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.getFullName()}"></td>
                    <td th:text="${c.policyNumber}"></td>
                    <td>
                        <span th:if="${c.policyType == 'LIFE'}">生命保険</span>
                        <span th:if="${c.policyType == 'MEDICAL'}">医療保険</span>
                        <span th:if="${c.policyType == 'AUTO'}">自動車保険</span>
                        <span th:if="${c.policyType == 'FIRE'}">火災保険</span>
                    </td>
                    <td>
                        <span th:if="${c.policyStatus == 0}" class="label label-warning">申請中</span>
                        <span th:if="${c.policyStatus == 1}" class="label label-success">有効</span>
                        <span th:if="${c.policyStatus == 2}" class="label label-danger">失効</span>
                        <span th:if="${c.policyStatus == 3}" class="label label-default">解約</span>
                    </td>
                    <td th:text="${#numbers.formatDecimal(c.premiumAmount, 0, 'COMMA', 0, 'POINT')}"></td>
                    <td th:text="${c.agentName}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>
</html>
