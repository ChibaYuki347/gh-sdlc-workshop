<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' - 保険CRM管理システム'">保険CRM管理システム</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"/>
    <style>
        body { padding-top: 70px; background-color: #f5f5f5; }
        .navbar-custom { background-color: #2c3e50; border-color: #233140; }
        .navbar-custom .navbar-brand,
        .navbar-custom .navbar-nav > li > a { color: #ecf0f1; }
        .navbar-custom .navbar-nav > li > a:hover { color: #ffffff; background-color: #34495e; }
        .navbar-custom .navbar-nav > .active > a,
        .navbar-custom .navbar-nav > .active > a:hover { color: #ffffff; background-color: #1a252f; }
        .footer { background-color: #ecf0f1; padding: 20px 0; margin-top: 40px; border-top: 1px solid #ddd; color: #7f8c8d; text-align: center; font-size: 12px; }
        .panel-heading h3 { margin: 0; }
        .stat-box { text-align: center; padding: 20px; }
        .stat-box .stat-number { font-size: 36px; font-weight: bold; color: #2c3e50; }
        .stat-box .stat-label { font-size: 14px; color: #7f8c8d; }
    </style>
</head>
<body>

<!-- ナビゲーションバー -->
<nav th:fragment="navbar" class="navbar navbar-default navbar-fixed-top navbar-custom">
    <div class="container">
        <div class="navbar-header">
            <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar-main">
                <span class="icon-bar"></span><span class="icon-bar"></span><span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" th:href="@{/}">&#x1F3E2; 保険CRM管理システム</a>
        </div>
        <div class="collapse navbar-collapse" id="navbar-main">
            <ul class="nav navbar-nav">
                <li><a th:href="@{/}">ダッシュボード</a></li>
                <li><a th:href="@{/customers}">顧客一覧</a></li>
                <li><a th:href="@{/customers/new}">顧客登録</a></li>
                <li><a th:href="@{/renewals}">&#x1F514; 更新通知</a></li>
                <li><a th:href="@{/premium-calculator}">保険料計算</a></li>
                <li><a th:href="@{/report}">月次レポート</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- フッター -->
<footer th:fragment="footer" class="footer">
    <div class="container">
        <p>&copy; 2024 Insurance CRM System - Internal Use Only</p>
    </div>
</footer>

</body>
</html>
